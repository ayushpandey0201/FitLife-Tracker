name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen --extra dev

      - name: Format check (ruff)
        run: uv run ruff format --check app tests

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Type-check (mypy, strict)
        run: uv run mypy

      - name: Tests (pytest + coverage)
        run: uv run pytest --cov=app --cov-report=term-missing

  migrations:
    name: Migrations against Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fitlife
          POSTGRES_PASSWORD: fitlife
          POSTGRES_DB: fitlife
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitlife -d fitlife"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://fitlife:fitlife@localhost:5432/fitlife
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen --extra dev

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Assert no schema drift
        run: uv run alembic check
